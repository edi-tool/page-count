<body>

    <div class="container">
        <h2>ページ調整さん</h2>
        <span class="subtitle">暫定のページ数から、台数の<strong>きりの良いページ数</strong>と、<strong>だいたいの背幅</strong>を表示します</span>

        <div class="instruction">暫定のページ数を入力</div>
        <input type="number" id="pageInput" placeholder="例: 160" oninput="calculate()">

        <div class="instruction" style="margin-top: 12px;">紙の厚さ (mm)を選択</div>
        <select id="thicknessInput" onchange="calculate()">
            <option value="0.09">0.09 (薄め)</option>
            <option value="0.10">0.10 (薄め)</option>
            <option value="0.11" selected>0.11 (標準)</option>
            <option value="0.12">0.12 (標準)</option>
            <option value="0.13">0.13 (標準)</option>
            <option value="0.14">0.14 (厚め)</option>
            <option value="0.15">0.15 (厚め)</option>
        </select>

        <div id="results" class="result"></div>
    </div>

    <footer>
        &copy; 2026 ISHIKAWA, Natsuki | MIT License
    </footer>

    <script>
        // 全角数字→半角に正規化
        function normalizeNumber(str) {
            return str.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
        }

        function calculate() {
            const raw = document.getElementById('pageInput').value;
            const p = parseInt(normalizeNumber(raw));
            const thickness = parseFloat(document.getElementById('thicknessInput').value);
            const resultsDiv = document.getElementById('results');

            if (!raw) {
                resultsDiv.innerHTML = '';
                return;
            }
            if (isNaN(p) || p <= 0) {
                resultsDiv.innerHTML = '<div class="option" style="color:#c0392b;">正の整数を入力してください</div>';
                return;
            }

            // ページ数調整の計算
            const units = [16, 8]; // 16ページ(全台)、8ページ(半台)
            let html = '<h3>おすすめのページ数</h3>';

            units.forEach(unit => {
                const low = Math.floor(p / unit) * unit;
                const high = Math.ceil(p / unit) * unit;

                html += `<div class="option">
                    <strong>${unit}ページ単位（${unit === 16 ? '全台' : '半台'}刻み）</strong><br>`;

                if (low === p) {
                    html += `現在、ちょうど <span class="highlight">${p}ページ</span> (${p / unit}台) です！`;
                } else {
                    html += `・案A: <span class="highlight">${low}ページ</span> (${low / unit}台) <small>... ${p - low}ページ減らす</small><br>`;
                    html += `・案B: <span class="highlight">${high}ページ</span> (${high / unit}台) <small>... ${high - p}ページ増やす</small>`;
                }
                html += `</div>`;
            });

            // 背幅の計算（並製本: ページ数 ÷ 2 × 紙厚 + 0.8）
            const spineWidth = (p / 2) * thickness + 0.8;

            html += `<h3 style="margin-top: 24px;">だいたいの背幅</h3>`;
            html += `<div class="option">
                <strong>並製本（入力した${p}ページの場合）</strong><br>
                約 <span class="highlight" style="font-size: 16px;">${spineWidth.toFixed(2)} mm</span><br>
                <small>計算式: ${p}p ÷ 2 × ${thickness.toFixed(2)}mm ＋ 0.8mm</small>
            </div>`;

            resultsDiv.innerHTML = html;
        }
    </script>
</body>
