<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>書籍ページ数・台数シミュレーター</title>
    <style>
        /* ページ全体をFlexboxにしてフッターを最下部に固定するための設定 */
        body { 
            font-family: sans-serif; 
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            line-height: 1.6; 
            background-color: #f9f9fb; /* 少し背景色をつけるとカードが引き立ちます */
        }

        /* メインコンテンツエリア */
        .container {
            flex: 1; /* 余白を全て吸収しフッターを下に押し出す */
            width: 100%;
            max-width: 500px; 
            margin: 40px auto; 
            padding: 0 20px;
            box-sizing: border-box;
        }

        .card { 
            background: #fff;
            border: 1px solid #ddd; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
        }

        /* H2と説明文のまとまりを調整 */
        .header-group {
            margin-bottom: 20px;
        }
        .header-group h2 {
            margin: 0 0 5px 0; /* 下の余白を狭くしてpタグに近づける */
            color: #333;
        }
        .header-group p {
            margin: 0;
            color: #666;
            font-size: 0.95rem;
        }

        input { width: 100%; padding: 12px; font-size: 1.2rem; margin: 10px 0 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .result { margin-top: 20px; }
        .option { background: #f4f8ff; padding: 15px; margin-bottom: 10px; border-left: 4px solid #007bff; border-radius: 0 4px 4px 0; }
        .highlight { font-weight: bold; color: #007bff; }

        /* フッターのスタイル */
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 15px 0;
            font-size: 0.85rem;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header-group">
                <h2>台数計算シミュレーター</h2>
                <p>暫定のページ数を入力してください：</p>
            </div>
            
            <input type="number" id="pageInput" placeholder="例: 150" oninput="calculate()">

            <div id="results" class="result">
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 ISHIKAWA Natsuki
    </footer>

    <script>
        function calculate() {
            const p = parseInt(document.getElementById('pageInput').value);
            const resultsDiv = document.getElementById('results');
            
            if (isNaN(p) || p <= 0) {
                resultsDiv.innerHTML = '';
                return;
            }

            const units = [16, 8]; // 16ページ(全台)、8ページ(半台)
            let html = '<h3>おすすめのページ数</h3>';

            units.forEach(unit => {
                const low = Math.floor(p / unit) * unit;
                const high = Math.ceil(p / unit) * unit;
                
                html += `<div class="option">
                    <strong>${unit}ページ単位（${unit === 16 ? '全台' : '半台'}刻み）</strong><br>`;
                
                if (low === p) {
                    html += `現在、ちょうど <span class="highlight">${p}ページ</span> (${p / unit}台) です！`;
                } else {
                    html += `・案A: <span class="highlight">${low}ページ</span> (${low / unit}台) <small>... ${p - low}ページ減らす</small><br>`;
                    html += `・案B: <span class="highlight">${high}ページ</span> (${high / unit}台) <small>... ${high - p}ページ増やす</small>`;
                }
                html += `</div>`;
            });

            resultsDiv.innerHTML = html;
        }
    </script>
</body>
</html>
